# Spring Application Configuration
spring.application.name=backend

# Database Configuration (MySQL)
# createDatabaseIfNotExist=true ensures the schema is created on first run
spring.datasource.url=jdbc:mysql://localhost:3306/saas_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration for Master Schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/master
spring.flyway.schemas=saas_db

# Security & CORS Configuration
# Allow the React development server to communicate with this backend
spring.web.cors.allowed-origins=http://localhost:5173

# JWT Security Configuration
# Secret key for signing tokens and expiration time (86400000ms = 24 hours)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000